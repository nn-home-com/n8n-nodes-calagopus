name: Publish

on:
  push:
    tags:
      - '*.*.*'

# Retry npm registry fetches so transient network errors (e.g. ECONNRESET) don't fail the run.
env:
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '20000'
  npm_config_fetch_retry_maxtimeout: '120000'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted publishing (OIDC) needs npm >= 11.5.1; lts/* may ship an older npm.
      - name: Ensure npm supports trusted publishing
        run: 'npm install -g npm@latest'

      - name: Install dependencies
        run: 'npm ci --ignore-scripts'

      # Auth is via npm Trusted Publishing (OIDC), enabled by id-token: write above.
      # No NPM_TOKEN needed; provenance is attached automatically.
      - name: Publish
        run: 'npm run release'
